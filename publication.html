<script>
	document.addEventListener("DOMContentLoaded", async () => {

	const SUPABASE_URL = "https://emakckalouwopodqehgn.supabase.co";
	const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtYWtja2Fsb3V3b3BvZHFlaGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU1NzA3OTYsImV4cCI6MjA4MTE0Njc5Nn0.eRQMLCrL4xEb58ap8RKTOyJx8pusfbr8Ut037GpYXfk";
	const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const list = document.getElementById("research-list");
const search = document.getElementById("search");

/* MOBILE SEARCH */
const searchMobile = document.getElementById("search-mobile");

if(searchMobile){
  searchMobile.oninput = () => {
    filters.text = searchMobile.value.toLowerCase();
    search.value = searchMobile.value; // keep desktop synced

}
/* ADD IT HERE */
const openFilter = document.getElementById("open-filter");
const closeFilter = document.getElementById("close-filter");
const filterPanel = document.getElementById("filter-panel");

openFilter.addEventListener("click", () => {
  filterPanel.classList.toggle("active");
});

closeFilter.addEventListener("click", () => {

});


/* rest of your code continues */
let dataCache = [];
const filters = {
  text: "",
  year: null,
  sdg: null,
  keyword: null
};

	const clearBtn = document.getElementById("clear-filters");
clearBtn.addEventListener("click", () => {
  // Reset filters
  filters.text = "";
  filters.year = null;
  filters.sdg = null;
  filters.keyword = null;

  // Reset search input
  search.value = "";

  // REMOVE active highlights
  document.querySelectorAll(".active-filter")
    .forEach(btn => btn.classList.remove("active-filter"));

  // Re-render all data
  applyFilters();
});


	/* ---------- HELPERS ---------- */
	const toArray = v =>
	  Array.isArray(v)
		? v
		: typeof v === "string"
		  ? v
			  .split(/[\n,]/)   // split by newline OR comma
			  .map(x => x.trim())
			  .filter(Boolean)
		  : [];
		  
	const getYear = d => {
  if(!d) return null;

  // If it's already a date-like string (or "July 2021")
  const parsed = new Date(d);
  if(!isNaN(parsed)) return parsed.getFullYear();

  // fallback for formats like "July 2021"
  const match = d.match(/\d{4}/);
  return match ? match[0] : null;
};



	const firstAuthor = a =>
	  Array.isArray(a) && a.length ? a[0] + (a.length>1 ? " et al." : "") : a || "";
	function applyFilters() {

  const filtered = dataCache.filter(r => {

    const matchText =
      !filters.text ||
      r.title?.toLowerCase().includes(filters.text) ||
      toArray(r.authors).join(" ").toLowerCase().includes(filters.text) ||
      toArray(r.advisers).join(" ").toLowerCase().includes(filters.text) ||
      (r.keywords||[]).some(k => k.toLowerCase().includes(filters.text));

    const matchYear =
      !filters.year || getYear(r.research_date) == filters.year;

    const matchSDG =
      !filters.sdg ||
      toArray(r.sdg).some(s =>
        s.trim().toLowerCase() === filters.sdg.toLowerCase()
      );

    const matchKeyword =
      !filters.keyword ||
      (r.keywords||[]).some(k =>
        k.toLowerCase().includes(filters.keyword.toLowerCase())
      );

    return matchText && matchYear && matchSDG && matchKeyword;
  });

  render(filtered);

  /* ---------- DYNAMIC FILTER UPDATE ---------- */
  renderYears(filtered);
  renderSDGs(filtered);
  renderKeywords(filtered);
}

	/* ---------- LOAD ---------- */
	async function load() {
	  const { data, error } = await supabaseClient
		.from("researches")
		.select("*")
		.order("created_at",{ascending:false});

	  if (error) {
		list.textContent = error.message;
		return;
	  }

	  dataCache = data || [];
	  render(dataCache);
	  renderYears(dataCache);
	  renderSDGs(dataCache);
	  renderKeywords(dataCache);
	}
	await load();

	/* ---------- RENDER ---------- */
	function render(rows) {
	  if (!rows.length) {
		list.textContent = "No research found.";
		return;
	  }

	  list.innerHTML = rows.map(r=>`
		<div class="abstract-page">
      <div class="abstract-title">
        ${r.title}
        <div class="abstract-meta">  ${firstAuthor(r.authors)} — ${getYear(r.research_date) || "—"}</div>
      </div>

      <div class="abstract-content">
        <div class="meta-grid">
          <div><strong>Authors:</strong></div>
		<div>${toArray(r.authors).join("<br>") || "—"}</div>

		<div><strong>Adviser:</strong></div>
		<div>${toArray(r.advisers).join("<br>") || "—"}</div>

		<div><strong>Course:</strong></div>
		<div>${toArray(r.course).join("<br>") || "—"}</div>

		<div><strong>SDG:</strong></div>
		<div>${toArray(r.sdg).join(", ") || "—"}</div>


          <div><strong>Date:</strong></div><div>${r.research_date||""}</div>
          <div><strong>Keywords:</strong></div><div>${(r.keywords||[]).join(", ")}</div>
        </div>

        <h4>EXECUTIVE SUMMARY</h4>
		<p style="text-indent: 50px; text-align: justify;">${r.abstract||""}</p>
		<br>
        <button class="download-pdf">Download PDF</button>
      </div>
    </div>
	  `).join("");

	  document.querySelectorAll(".abstract-title").forEach(t=>{
		t.onclick = () => t.nextElementSibling.style.display =
		  t.nextElementSibling.style.display === "block" ? "none" : "block";
	  });

	  // PDF download
document.querySelectorAll(".download-pdf").forEach((btn, i) => {
  btn.onclick = () => {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: "a4" });
    const r = rows[i];

    const pageWidthFull = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();
    const marginLeft = 15;
    const contentWidth = 180;
    const headerHeight = 40;

    const labelX = 15;
    const valueX = 45;
    const lineSpacing = 7;

    const loadImage = (src) => {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.src = src;
        img.onload = () => resolve(img);
        img.onerror = reject;
      });
    };

    loadImage("headerpdf.png").then(img => {

      const addHeader = () => {
        doc.addImage(img, "PNG", 0, 0, pageWidthFull, headerHeight);
      };

      addHeader();
      let y = headerHeight + 15;

      /* ---------- TITLE ---------- */
      doc.setFontSize(12);
      doc.setFont("helvetica", "bold");
      const titleLines = doc.splitTextToSize(r.title || "", contentWidth);
      doc.text(titleLines, marginLeft, y);
      y += titleLines.length * 7 + 5;

      doc.setFontSize(12);

      /* ---------- AUTHORS ---------- */
      doc.setFont("helvetica", "bold");
      doc.text("Authors:", labelX, y);

      doc.setFont("helvetica", "normal");
      let metaY = y;

      toArray(r.authors).forEach(name => {
        const lines = doc.splitTextToSize(name.toUpperCase(), contentWidth - 35);
        doc.text(lines, valueX, metaY);
        metaY += lines.length * lineSpacing;
      });

      y = metaY + 5;

      /* ---------- ADVISER ---------- */
      if (r.advisers?.length) {
        doc.setFont("helvetica", "bold");
        doc.text("Adviser:", labelX, y);

        doc.setFont("helvetica", "normal");
        metaY = y;

        toArray(r.advisers).forEach(name => {
          const lines = doc.splitTextToSize(name, contentWidth - 35);
          doc.text(lines, valueX, metaY);
          metaY += lines.length * lineSpacing;
        });

        y = metaY + 5;
      }

      /* ---------- COURSE ---------- */
      if (r.course?.length) {
        doc.setFont("helvetica", "bold");
        doc.text("Course:", labelX, y);

        doc.setFont("helvetica", "normal");
        const lines = doc.splitTextToSize(toArray(r.course).join(", "), contentWidth - 35);
        doc.text(lines, valueX, y);
        y += lines.length * lineSpacing + 5;
      }

      /* ---------- SDG ---------- */
      if (r.sdg?.length) {
        doc.setFont("helvetica", "bold");
        doc.text("SDG:", labelX, y);

        doc.setFont("helvetica", "normal");
        const lines = doc.splitTextToSize(toArray(r.sdg).join(", "), contentWidth - 35);
        doc.text(lines, valueX, y);
        y += lines.length * lineSpacing + 5;
      }

      /* ---------- DATE ---------- */
      if (r.research_date) {
        doc.setFont("helvetica", "bold");
        doc.text("Date:", labelX, y);

        doc.setFont("helvetica", "normal");
        const lines = doc.splitTextToSize(r.research_date, contentWidth - 35);
        doc.text(lines, valueX, y);
        y += lines.length * lineSpacing + 5;
      }

      /* ---------- KEYWORDS ---------- */
      if (r.keywords?.length) {
        doc.setFont("helvetica", "bold");
        doc.text("Keywords:", labelX, y);

        doc.setFont("helvetica", "normal");
        const lines = doc.splitTextToSize((r.keywords || []).join(", "), contentWidth - 35);
        doc.text(lines, valueX, y);
        y += lines.length * lineSpacing + 5;
      }

      /* ---------- EXECUTIVE SUMMARY ---------- */
      if (r.abstract) {

        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text("EXECUTIVE SUMMARY", marginLeft, y);
        y += 10;

        doc.setFontSize(12);
        doc.setFont("helvetica", "normal");

        const lines = doc.splitTextToSize(r.abstract, contentWidth);

lines.forEach((line, idx) => {

  if (y > pageHeight - 15) {
    doc.addPage();
    addHeader();
    y = headerHeight + 15;
  }

  // Justify all lines except the last line
  if (idx < lines.length - 1) {
    doc.text(line, marginLeft, y, { maxWidth: contentWidth, align: 'justify' });
  } else {
    // Last line should be left-aligned
    doc.text(line, marginLeft, y, { maxWidth: contentWidth, align: 'left' });
  }

  y += 7;
});
      }

      doc.save(`${r.title || "research"}.pdf`);

    }).catch(() => {
      alert("Header image not found. Check file path.");
    });

  };
});
}
	/* ---------- SEARCH ---------- */
	search.oninput = () => {
	  filters.text = search.value.toLowerCase();
	  applyFilters();
	};

	/* ---------- FILTERS ---------- */
	function renderYears(data){

  const years = [
    ...new Set(
      data.map(d => getYear(d.research_date)).filter(Boolean)
    )
  ].sort((a,b) => b-a);

  const container = document.getElementById("year-buttons");
  container.innerHTML = "";

  years.forEach(year => {

    const btn = document.createElement("button");
    btn.textContent = year;

    if(filters.year == year){
      btn.classList.add("active-filter");
    }

    btn.addEventListener("click", () => {

      filters.year = filters.year === year ? null : year;
      applyFilters();

    });

    container.appendChild(btn);

  });
}

function renderSDGs(data) {

  const sdgMap = {};

  data.forEach(d => {
    toArray(d.sdg).forEach(s => {
      const normalized = s.trim();
      sdgMap[normalized] = (sdgMap[normalized] || 0) + 1;
    });
  });

  const container = document.getElementById("sdg-buttons");
  container.innerHTML = "";

  Object.keys(sdgMap)
    .sort((a,b)=>{
      const numA = parseInt(a.match(/\d+/)?.[0]) || 0;
      const numB = parseInt(b.match(/\d+/)?.[0]) || 0;
      return numA-numB;
    })
    .forEach(sdg => {

      const btn = document.createElement("button");
      btn.textContent = sdg;

      if(filters.sdg === sdg){
        btn.classList.add("active-filter");
      }

      btn.addEventListener("click", () => {

        filters.sdg = filters.sdg === sdg ? null : sdg;
        applyFilters();

      });

      container.appendChild(btn);

    });
}

	function renderKeywords(data){

  const m = {};

  data.forEach(d => {
    toArray(d.keywords).forEach(k => {
      m[k] = (m[k] || 0) + 1;
    });
  });

  const container = document.getElementById("keyword-buttons");
  container.innerHTML = "";

  Object.entries(m)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,10)
    .forEach(([k]) => {

      const btn = document.createElement("button");
      btn.textContent = k;

      if(filters.keyword === k){
        btn.classList.add("active-filter");
      }

      btn.addEventListener("click", () => {

        filters.keyword = filters.keyword === k ? null : k;
        applyFilters();

      });

      container.appendChild(btn);

    });
}
	});
